<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat | Human & AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Stranger Chat</h2>
            <h1 id="girlName">Matching...</h1>
            <p id="statusText">Looking for a real person...</p>
            <button id="newMatchBtn" onclick="findMatch()">Next Stranger</button>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Say something...">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script src="script.js"></script>

    <script src="https://pl18542856.effectivegatecpm.com/9e/92/2a/9e922a88646c975a30e5bc5dcf67a529.js"></script>

</body>
</html>
