<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat | Human & AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>STRANGER CHAT</h2>
            <div id="girlName">Matching...</div>
            <div id="statusText">Searching for a real person...</div>
            <button id="newMatchBtn" onclick="findMatch()">Next Stranger</button>
        </div>

        <div id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Say something..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script async="async" data-cfasync="false" src="https://pl28827593.effectivegatecpm.com/b5/e2/f1/b5e2f107e685a8f2b151a5bd0346eedf.js"></script>

    <script src="script.js"></script>
</body>
</html>
