<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat | Match Randomly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Stranger Chat</h2>
            <h1 id="girlName">Matching...</h1>
            <p id="statusText">Finding a stranger nearby...</p>
            
            <button id="newMatchBtn" onclick="pickRandomGirl()" style="margin-top: 10px; padding: 5px 15px; font-size: 0.7rem; background: #30363d; border-radius: 5px;">
                Find New Stranger
            </button>
        </div>

        <div id="chatBox">
            </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Say hi..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
