<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="https://pl28827593.effectivegatecpm.com/b5/e2/f1/b5e2f107e685a8f2b151a5bd0346eedf.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: -apple-system, sans-serif;
        }

        .bubbles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .bubble { position: absolute; bottom: -100px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(80px); opacity: 0.8; }
            100% { bottom: 100vh; transform: translateX(-40px); opacity: 0; }
        }

        .container { 
            width: 95%; height: 90vh; max-width: 450px; 
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; flex-direction: column; padding: 25px; z-index: 10; position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h2 { text-align: center; color: white; margin-top: 0; margin-bottom: 5px; font-size: 26px; }
        #statusText { text-align: center; color: white; font-size: 12px; margin-bottom: 20px; opacity: 0.9; }
        
        #chatBox { 
            flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
        }
        
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #6c5ce7; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; }
        
        .input-area { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 14px 20px; border: none; border-radius: 30px; outline: none; font-size: 16px; }
        button#sendBtn { width: 50px; height: 50px; border: none; border-radius: 50%; background: #6c5ce7; color: white; font-size: 18px; cursor: pointer; }
        .next-btn { width: 100%; padding: 14px; border: none; border-radius: 20px; background: rgba(255, 255, 255, 0.3); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble" style="left: 10%;"></div>
        <div class="bubble" style="left: 40%; width: 20px;"></div>
        <div class="bubble" style="left: 75%; width: 60px;"></div>
    </div>

    <div class="container">
        <h2 id="girlName">Chat</h2>
        <div id="statusText">searching...</div>
        
        <div id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type here..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        
        <button class="next-btn" onclick="findMatch()">Next Stranger</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
