<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: -apple-system, sans-serif;
        }

        .bubbles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .bubble { position: absolute; bottom: -100px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(80px); opacity: 0.8; }
            100% { bottom: 100vh; transform: translateX(-40px); opacity: 0; }
        }

        .container { 
            width: 95%; height: 95vh; max-width: 450px; 
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; flex-direction: column; padding: 15px; z-index: 10; position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h2 { text-align: center; color: white; margin: 5px 0; font-size: 20px; }
        #statusText { text-align: center; color: white; font-size: 11px; margin-bottom: 10px; opacity: 0.9; }
        
        #chatBox { 
            flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 12px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
        }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; }
        .user { align-self: flex-end; background: #6c5ce7; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; }
        
        .input-area { display: flex; gap: 8px; margin-bottom: 8px; }
        input { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button#sendBtn { width: 45px; height: 45px; border: none; border-radius: 50%; background: #6c5ce7; color: white; cursor: pointer; }
        .next-btn { width: 100%; padding: 12px; border: none; border-radius: 20px; background: rgba(255, 255, 255, 0.3); color: white; font-weight: bold; cursor: pointer; }

        /* Ad Containers */
        .ad-top { width: 100%; min-height: 50px; margin-bottom: 10px; text-align: center; }
        .ad-bottom { width: 100%; margin-top: 10px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble" style="left: 15%;"></div>
        <div class="bubble" style="left: 45%; width: 20px;"></div>
        <div class="bubble" style="left: 80%; width: 60px;"></div>
    </div>

    <div class="container">
        <div class="ad-top">
            <script async="async" data-cfasync="false" src="https://pl28827871.effectivegatecpm.com/ddd7b30b0f13fbc10ca1922e5f73fa3f/invoke.js"></script>
            <div id="container-ddd7b30b0f13fbc10ca1922e5f73fa3f"></div>
        </div>

        <h2 id="girlName">Chat</h2>
        <div id="statusText">searching...</div>
        <div id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type here..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        
        <button class="next-btn" onclick="findMatch()">Next Stranger</button>

            <script type="text/javascript" src="https://www.highperformanceformat.com/3c5b7543fbf55d98d08f5625426702a8/invoke.js"></script>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
