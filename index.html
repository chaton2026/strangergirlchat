<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>STRANGER CHAT</h2>
            <h1 id="girlName">Matching...</h1>
            <p id="statusText">Finding a stranger nearby...</p>
            <button onclick="pickRandomGirl()" id="newMatchBtn">Find New Stranger</button>
        </div>

        <div id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Say hi..." autocomplete="off">
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
