<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* Basic Dark-Mode Style */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #ff7eb3, #ff758c); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: white; margin-bottom: 5px; }
        #statusText { text-align: center; color: #fff; font-size: 12px; margin-bottom: 15px; opacity: 0.8; }
        #chatBox { height: 350px; overflow-y: auto; background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; margin-bottom: 15px; }
        .msg { margin: 5px 0; padding: 10px; border-radius: 10px; max-width: 80%; word-wrap: break-word; font-size: 14px; }
        .user { align-self: flex-end; background: #6c5ce7; color: white; }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.3); color: white; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; background: rgba(255, 255, 255, 0.3); color: white; }
        input::placeholder { color: #eee; }
        button { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; background: #6c5ce7; color: white; transition: 0.3s; }
        button:hover { background: #5849c4; }
        .next-btn { width: 100%; margin-top: 10px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="girlName">Chat</h2> <div id="statusText">connecting...</div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
    
    <button class="next-btn" onclick="findMatch()">Next Stranger</button>
</div>

<script src="script.js"></script>

</body>
</html>
