<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #ff7eb3; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }
        .container { 
            width: 95%; 
            max-width: 420px; 
            height: 92vh; 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            border-radius: 25px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h2 { text-align: center; color: white; margin: 5px 0; font-size: 22px; }
        #statusText { text-align: center; color: white; font-size: 11px; margin-bottom: 10px; opacity: 0.9; }
        
        #chatBox { 
            flex: 1; /* Stretches to fill mobile height */
            overflow-y: auto; 
            background: rgba(0, 0, 0, 0.1); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 15px; word-wrap: break-word; line-height: 1.4; }
        .user { align-self: flex-end; background: #6c5ce7; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.85); color: #333; border-bottom-left-radius: 4px; }
        
        .input-area { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border: none; 
            border-radius: 25px; 
            background: white; 
            color: #333; 
            outline: none; 
            font-size: 16px; /* Prevents auto-zoom on mobile */
        }
        button#sendBtn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 25px; 
            background: #6c5ce7; 
            color: white; 
            font-weight: bold; 
            cursor: pointer;
        }
        .next-btn { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 25px; 
            background: rgba(0,0,0,0.2); 
            color: white; 
            font-weight: bold; 
            cursor: pointer;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="girlName">Chat</h2>
    <div id="statusText">searching...</div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type message..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
    
    <button class="next-btn" onclick="findMatch()">Next Stranger</button>
</div>

<script src="script.js"></script>

</body>
</html>
