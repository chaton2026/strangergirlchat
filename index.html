<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Girl Chat | Human & AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .chat-window {
            width: 95%; max-width: 420px; height: 85vh;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); display: flex; flex-direction: column;
        }

        .chat-header { padding: 15px; background: rgba(255, 255, 255, 0.1); border-bottom: 1px solid var(--glass-border); text-align: center; color: white; font-weight: 600; }
        .messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; color: white; animation: fadeIn 0.3s ease; position: relative; }
        .message.user { align-self: flex-end; background: var(--primary-gradient); border-bottom-right-radius: 2px; }
        .message.stranger { align-self: flex-start; background: rgba(255, 255, 255, 0.2); border-bottom-left-radius: 2px; }

        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0, 0, 0, 0.1); }
        input[type="text"] { flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); border-radius: 25px; padding: 10px 15px; color: white; outline: none; }
        
        .btn { border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-send { background: var(--primary-gradient); }
        .btn-next { background: rgba(255, 255, 255, 0.2); }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* Typing Indicator dots */
        .typing-indicator { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="chat-window">
        <div class="chat-header" id="header-title">Stranger Girl Chat</div>
        <div class="messages-container" id="chat-box"></div>
        <div class="input-area">
            <button class="btn btn-next" onclick="location.reload()">Next</button>
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="btn btn-send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB5vVD-CBhUz1J6uapnpbw4wJ8BL5MGF1I",
            authDomain: "strangerchat-1ae52.firebaseapp.com",
            databaseURL: "https://strangerchat-1ae52-default-rtdb.firebaseio.com",
            projectId: "strangerchat-1ae52",
            storageBucket: "strangerchat-1ae52.firebasestorage.app",
            messagingSenderId: "1070881075346",
            appId: "1:1070881075346:web:7d30960674893553aa764b",
            measurementId: "G-WHR7GL9JE0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoomId = null;
        let isMatched = false;
        let searchTimer = null;
        
        // Randomly pick an AI persona for the session
        const personas = ["Zara", "Aanya", "Riya"];
        const activePersona = personas[Math.floor(Math.random() * personas.length)];

        window.onload = () => { 
            document.getElementById('header-title').innerText = "Chat with " + activePersona;
            startMatching(); 
        };

        function startMatching() {
            appendMessage("Searching for a partner...", "stranger");
            searchTimer = setTimeout(() => { if (!isMatched) connectToAI(); }, 10000); // 10s wait

            db.ref('rooms').orderByChild('status').equalTo('waiting').limitToFirst(1).once('value', snapshot => {
                if (snapshot.exists()) {
                    joinRoom(Object.keys(snapshot.val())[0]);
                } else {
                    createNewRoom();
                }
            });
        }

        function createNewRoom() {
            const newRoomRef = db.ref('rooms').push();
            currentRoomId = newRoomRef.key;
            newRoomRef.set({ status: 'waiting', user1: 'present' });
            newRoomRef.on('value', snapshot => {
                if (snapshot.val() && snapshot.val().user2) confirmMatch();
            });
        }

        function joinRoom(id) {
            currentRoomId = id;
            db.ref('rooms/' + id).update({ status: 'active', user2: 'present' });
            confirmMatch();
        }

        function confirmMatch() {
            isMatched = true;
            clearTimeout(searchTimer);
            document.getElementById('chat-box').innerHTML = ""; 
            appendMessage("Connected to a stranger! Say hi.", "stranger");
            listenForMessages();
        }

        function listenForMessages() {
            db.ref('messages/' + currentRoomId).on('child_added', snapshot => {
                const data = snapshot.val();
                if (data.sender !== 'me') appendMessage(data.text, 'stranger');
            });
        }

        function connectToAI() {
            isMatched = false;
            document.getElementById('chat-box').innerHTML = ""; 
            appendMessage("No humans online. Connecting to " + activePersona + " (AI)...", "stranger");
        }

        async function sendToAI(text) {
            showTyping(true);
            try {
                // REPLACE with your actual Cloudflare Worker URL
                async function sendToAI(text) {
    showTyping(true);
    try {
        const response = await fetch('https://stranger-chat-ai.sujaykumar20192019.workers.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }, // Added this header
            body: JSON.stringify({ message: text, persona: activePersona })
        });
        const data = await response.json();
        
        // This is the fix: make sure it accesses data.reply
        if (data && data.reply) {
            appendMessage(data.reply, "stranger");
        } else {
            appendMessage("I'm a bit lost for words... try again?", "stranger");
        }
    } catch (error) {
        appendMessage("Aanya is busy... try again!", "stranger");
    }
    showTyping(false);
}
                appendMessage(activePersona + " is thinking... try again!", "stranger");
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, "user");
            input.value = "";

            if (isMatched) {
                db.ref('messages/' + currentRoomId).push({ text: text, sender: 'me' });
            } else {
                sendToAI(text);
            }
        }

        function appendMessage(text, side) {
            const chatBox = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = `message ${side}`;
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping(isTyping) {
            const chatBox = document.getElementById('chat-box');
            let loader = document.getElementById('ai-loader');
            if (isTyping && !loader) {
                loader = document.createElement('div');
                loader.id = 'ai-loader';
                loader.className = 'message stranger';
                loader.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
                chatBox.appendChild(loader);
            } else if (!isTyping && loader) {
                loader.remove();
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
